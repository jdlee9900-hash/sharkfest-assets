<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline · SharkFest</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0a0f1e; color: #fff;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .wrap { max-width: 360px; }
    img { width: 96px; height: 96px; margin: 0 auto 1.5rem; display: block; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; letter-spacing: -0.01em; }
    p { color: #94a3b8; line-height: 1.6; font-size: 0.95rem; margin-bottom: 1.5rem; }
    button {
      background: #fbbf24; color: #0a0f1e; border: none; cursor: pointer;
      font-size: 0.9rem; font-weight: 700; padding: 0.75rem 1.5rem; border-radius: 8px;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="/icon-192.png" alt="SharkFest">
    <h1>You're offline</h1>
    <p>We couldn't reach SharkFest right now. Check your connection and try again — your membership and booking will be here waiting.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
